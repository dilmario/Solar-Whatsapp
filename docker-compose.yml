services:
  web:
    image: node:18-alpine
    container_name: solar-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://backend:5000
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    networks:
      - solar-network

  backend:
    build: ./backend
    container_name: solar-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
    networks:
      - solar-network

  postgres:
    image: postgres:15-alpine
    container_name: solar-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution
      - POSTGRES_DB=evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - solar-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution_user -d evolution_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: solar-evolution-api
    ports:
      - "8082:8080"
      - "8081:8081"
    env_file:
      - ./evolution.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - evolution_instances:/app/evolution/instances
    restart: unless-stopped
    networks:
      - solar-network

  redis:
    image: redis:7-alpine
    container_name: solar-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - solar-network

volumes:
  postgres_data:
  redis_data:
  evolution_instances:

networks:
  solar-network:
    driver: bridge
