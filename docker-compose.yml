services:

  # ── Frontend Next.js (dashboard do consultor) ──────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: solar-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      # Aponta para o backend FastAPI (não mais Flask)
      - NEXT_PUBLIC_API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - solar-network
    restart: unless-stopped

  # ── Backend FastAPI (bot + API de leads) ──────────────────────────────────
  backend:
    build: ./backend
    container_name: solar-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - solar-network
    restart: unless-stopped

  # ── Redis (state + leads + dedup) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: solar-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - solar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Postgres (Evolution API) ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: solar-postgres
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - solar-network
    restart: unless-stopped
    healthcheck:
      # CORRIGIDO: usuário e banco alinhados com as vars acima
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Evolution API (gateway WhatsApp) ──────────────────────────────────────
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: solar-evolution-api
    ports:
      - "8082:8080"
    env_file:
      - ./evolution.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - evolution_instances:/app/evolution/instances
    networks:
      - solar-network
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  evolution_instances:

networks:
  solar-network:
    driver: bridge
